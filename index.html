<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevimliKino — Любимый портал кино</title>
    <style>
        :root {
            --bg-main: #0a0d14;
            --bg-card: #121824;
            --bg-hover: #1c2536;
            --accent: #ff2a5f;
            --accent-glow: rgba(255, 42, 95, 0.35);
            --text-primary: #f0f4f8;
            --text-secondary: #8a99ad;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ШАПКА */
        header {
            position: sticky;
            top: 0;
            z-index: 90;
            background: rgba(10, 13, 20, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent);
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-accent {
            background: var(--accent);
            border: none;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-accent:hover {
            background: #e02250;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 260px;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px 16px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .genres {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .chip.active, .chip:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* СЕТКА ФИЛЬМОВ */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #182030;
        }

        .poster-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(10, 13, 20, 0.8);
            backdrop-filter: blur(6px);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .movie-info {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .movie-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .movie-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 440px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.4rem;
            cursor: pointer;
        }

        /* ФОРМА АУТЕНТИФИКАЦИИ */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-group input {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            color: #fff;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .error-msg {
            color: #ff4757;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        /* АУТЕНТИФИКАЦИЯ: ПИН И ГРАФИЧЕСКИЙ КЛЮЧ */
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--bg-main);
            padding: 4px;
            border-radius: var(--radius-md);
        }

        .auth-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-tab.active {
            background: var(--bg-card);
            color: #fff;
        }

        .pin-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            transition: 0.2s;
        }

        .pin-dot.filled {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 240px;
            margin: 0 auto;
        }

        .num-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .num-btn:active {
            background: var(--accent);
        }

        .pattern-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        canvas#patternCanvas {
            background: var(--bg-main);
            border-radius: var(--radius-md);
            touch-action: none;
            cursor: pointer;
        }

        /* ДЕТАЛИ ФИЛЬМА */
        .movie-detail-modal {
            max-width: 700px;
            padding: 0;
            overflow: hidden;
        }

        .movie-detail-content {
            display: flex;
            flex-direction: column;
        }

        .trailer-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .trailer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .detail-body {
            padding: 20px 24px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .detail-title {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .detail-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logoBtn">
            🎬 Sevimli<span>Kino</span>
        </div>
        <div class="user-nav">
            <button class="btn" id="favBtn" style="display:none;">❤️ Избранное</button>
            <button class="btn btn-accent" id="loginBtn">Войти в профиль</button>
        </div>
    </header>

    <main>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск фильма по названию...">
            </div>
            <div class="genres" id="genresContainer">
                <div class="chip active" data-genre="all">Все</div>
                <div class="chip" data-genre="Экшен">Экшен</div>
                <div class="chip" data-genre="Фантастика">Фантастика</div>
                <div class="chip" data-genre="Драма">Драма</div>
                <div class="chip" data-genre="Триллер">Триллер</div>
            </div>
        </div>

        <div class="movies-grid" id="moviesGrid"></div>
    </main>

    <!-- МОДАЛКА АУТЕНТИФИКАЦИИ -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <button class="modal-close" id="closeAuth">&times;</button>
            <h3 style="text-align: center; margin-bottom: 6px;" id="authTitle">Вход в SevimliKino</h3>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem;" id="authSubtitle">Выберите удобный способ авторизации</p>

            <div class="auth-tabs" style="margin-top: 14px;">
                <div class="auth-tab active" id="tabEmail">Email</div>
                <div class="auth-tab" id="tabPin">PIN-код</div>
                <div class="auth-tab" id="tabPattern">Графический ключ</div>
            </div>

            <!-- 1. АВТОРИЗАЦИЯ ЧЕРЕЗ EMAIL (FIREBASE) -->
            <div id="emailBlock">
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPass" required placeholder="••••••••">
                    </div>
                    <div class="error-msg" id="errorMsg"></div>
                    <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 6px;">Войти</button>
                    <p style="font-size:0.8rem; text-align:center; color: var(--text-secondary); cursor:pointer;" id="switchReg">
                        Нет аккаунта? Зарегистрироваться
                    </p>
                </form>

                <form class="auth-form" id="regForm" style="display: none;">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" required placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPass" required placeholder="••••••••">
                    </div>
                    <div class="error-msg" id="regErrorMsg"></div>
                    <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 6px;">Зарегистрироваться</button>
                    <p style="font-size:0.8rem; text-align:center; color: var(--text-secondary); cursor:pointer;" id="switchLogin">
                        Уже есть аккаунт? Войти
                    </p>
                </form>
            </div>

            <!-- 2. ВВОД ПИН (ЛОКАЛЬНО) -->
            <div id="pinBlock" style="display: none;">
                <div class="pin-display">
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                </div>
                <div class="numpad">
                    <button class="num-btn">1</button>
                    <button class="num-btn">2</button>
                    <button class="num-btn">3</button>
                    <button class="num-btn">4</button>
                    <button class="num-btn">5</button>
                    <button class="num-btn">6</button>
                    <button class="num-btn">7</button>
                    <button class="num-btn">8</button>
                    <button class="num-btn">9</button>
                    <button class="num-btn" style="visibility: hidden;"></button>
                    <button class="num-btn">0</button>
                    <button class="num-btn" id="numClear">⌫</button>
                </div>
            </div>

            <!-- 3. ВВОД ГРАФИЧЕСКОГО КЛЮЧА -->
            <div id="patternBlock" class="pattern-container" style="display: none;">
                <canvas id="patternCanvas" width="240" height="240"></canvas>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ДЕТАЛЕЙ ФИЛЬМА -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-card movie-detail-modal">
            <button class="modal-close" id="closeDetail">&times;</button>
            <div class="movie-detail-content">
                <div class="trailer-container" id="trailerBox"></div>
                <div class="detail-body">
                    <div class="detail-header">
                        <div>
                            <h2 class="detail-title" id="mTitle">Название фильма</h2>
                            <span class="movie-meta" id="mMeta">2024 • Жанр</span>
                        </div>
                        <button class="btn" id="toggleFavBtn">❤️ В избранное</button>
                    </div>
                    <p class="detail-desc" id="mDesc">Описание...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ИНИЦИАЛИЗАЦИЯ FIREBASE SDK И ЛОГИКА ПРИЛОЖЕНИЯ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            updateProfile, 
            signOut, 
            onAuthStateChanged,
            sendEmailVerification 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTcRlgSy_tQ_nxyk7Y8-DjiQ8RnjA-hYw",
            authDomain: "sevimlikino.firebaseapp.com",
            projectId: "sevimlikino",
            storageBucket: "sevimlikino.firebasestorage.app",
            messagingSenderId: "166243734025",
            appId: "1:166243734025:web:6d258f207c8c58ab671ed8",
            measurementId: "G-VPG39S6R4T"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);

        // --- ДАННЫЕ ФИЛЬМОВ ---
        const MOVIES_DATA = [
            {
                id: 1,
                title: "Дюна: Часть вторая",
                genre: "Фантастика",
                year: 2024,
                rating: 8.6,
                poster: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500&q=80",
                trailer: "https://www.youtube.com/embed/Way9Dexny3w",
                desc: "Пол Атрейдес объединяется с Чани и фременами, возглавляя месть против заговорщиков, уничтоживших его семью."
            },
            {
                id: 2,
                title: "Темный рыцарь",
                genre: "Экшен",
                year: 2008,
                rating: 9.0,
                poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500&q=80",
                trailer: "https://www.youtube.com/embed/EXeTwQWrcwY",
                desc: "Бэтмен поднимает ставки в войне с криминалом. С помощью лейтенанта Джима Гордона и прокурора Харви Дента он намерен очистить улицы Готэма."
            },
            {
                id: 3,
                title: "Интерстеллар",
                genre: "Фантастика",
                year: 2014,
                rating: 8.7,
                poster: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500&q=80",
                trailer: "https://www.youtube.com/embed/zSWdZVtXT7E",
                desc: "Наше время на Земле подходит к концу. Команда исследователей берет на себя самую важную миссию в истории человечества."
            },
            {
                id: 4,
                title: "Бегущий по лезвию 2049",
                genre: "Фантастика",
                year: 2017,
                rating: 8.0,
                poster: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&q=80",
                trailer: "https://www.youtube.com/embed/gCcx85zbxz4",
                desc: "Офицер К раскрывает давнюю тайну, которая может погрузить остатки общества в хаос."
            }
        ];

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        let state = {
            user: null,
            favorites: JSON.parse(localStorage.getItem('sk_favs')) || [],
            currentFilter: 'all',
            searchQuery: '',
            selectedMovie: null,
            inputPin: ''
        };

        const grid = document.getElementById('moviesGrid');
        const loginBtn = document.getElementById('loginBtn');
        const favBtn = document.getElementById('favBtn');
        const authModal = document.getElementById('authModal');
        const detailModal = document.getElementById('detailModal');

        // Отслеживание входа через Firebase Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.user = user;
                loginBtn.textContent = user.displayName || user.email.split('@')[0];
                favBtn.style.display = 'inline-flex';
            } else {
                state.user = null;
                loginBtn.textContent = 'Войти в профиль';
                favBtn.style.display = 'none';
            }
        });

        // --- РЕНДЕР ФИЛЬМОВ ---
        function renderMovies() {
            grid.innerHTML = '';
            const filtered = MOVIES_DATA.filter(movie => {
                const matchGenre = state.currentFilter === 'all' || movie.genre === state.currentFilter;
                const matchSearch = movie.title.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchGenre && matchSearch;
            });

            filtered.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="poster-wrapper">
                        <img src="${movie.poster}" alt="${movie.title}" loading="lazy">
                        <div class="rating-badge">★ ${movie.rating}</div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">${movie.year} • ${movie.genre}</div>
                    </div>
                `;
                card.addEventListener('click', () => openMovieDetail(movie));
                grid.appendChild(card);
            });
        }

        function openMovieDetail(movie) {
            state.selectedMovie = movie;
            document.getElementById('mTitle').textContent = movie.title;
            document.getElementById('mMeta').textContent = `${movie.year} • ${movie.genre} • ★ ${movie.rating}`;
            document.getElementById('mDesc').textContent = movie.desc;
            document.getElementById('trailerBox').innerHTML = `<iframe src="${movie.trailer}" allowfullscreen></iframe>`;
            
            updateFavButton();
            detailModal.classList.add('active');
        }

        function updateFavButton() {
            const toggleBtn = document.getElementById('toggleFavBtn');
            if (!state.selectedMovie) return;
            const isFav = state.favorites.includes(state.selectedMovie.id);
            toggleBtn.textContent = isFav ? '❤️ В избранном' : '🤍 В избранное';
        }

        document.getElementById('toggleFavBtn').addEventListener('click', () => {
            if (!state.user) {
                alert('Сначала войдите в аккаунт!');
                return;
            }
            const id = state.selectedMovie.id;
            const idx = state.favorites.indexOf(id);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(id);
            
            localStorage.setItem('sk_favs', JSON.stringify(state.favorites));
            updateFavButton();
        });

        document.getElementById('closeDetail').addEventListener('click', () => {
            detailModal.classList.remove('active');
            document.getElementById('trailerBox').innerHTML = '';
        });

        // --- ЛОГИКА АВТОРИЗАЦИИ МЕЖДУ FIREBASE И ЛОКАЛЬНОЙ ---
        loginBtn.addEventListener('click', () => {
            if (state.user) {
                if (confirm("Вы действительно хотите выйти из профиля?")) {
                    signOut(auth);
                }
            } else {
                authModal.classList.add('active');
            }
        });

        document.getElementById('closeAuth').addEventListener('click', () => {
            authModal.classList.remove('active');
        });

        // Вход по Email (Firebase)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const errEl = document.getElementById('errorMsg');

            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (!res.user.emailVerified) {
                    errEl.textContent = "Пожалуйста, подтвердите Ваш Email по ссылке в письме!";
                    errEl.style.display = 'block';
                    await signOut(auth);
                    return;
                }
                authModal.classList.remove('active');
                errEl.style.display = 'none';
            } catch (err) {
                errEl.textContent = "Ошибка входа: неверный Email или пароль!";
                errEl.style.display = 'block';
            }
        });

        // Регистрация по Email (Firebase + Подтверждение)
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const errEl = document.getElementById('regErrorMsg');

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                await sendEmailVerification(res.user);

                alert("Регистрация успешна! На ваш Email отправлено письмо. Подтвердите его перед входом.");
                authModal.classList.remove('active');
                errEl.style.display = 'none';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        });

        // Переключение между формами Email
        document.getElementById('switchReg').addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('regForm').style.display = 'flex';
        });

        document.getElementById('switchLogin').addEventListener('click', () => {
            document.getElementById('regForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'flex';
        });

        // Переключение вкладок Email / PIN / Pattern
        document.getElementById('tabEmail').addEventListener('click', (e) => {
            switchTab('emailBlock', e.target);
        });

        document.getElementById('tabPin').addEventListener('click', (e) => {
            switchTab('pinBlock', e.target);
        });

        document.getElementById('tabPattern').addEventListener('click', (e) => {
            switchTab('patternBlock', e.target);
            initPatternNodes();
        });

        function switchTab(blockId, tabEl) {
            document.getElementById('emailBlock').style.display = 'none';
            document.getElementById('pinBlock').style.display = 'none';
            document.getElementById('patternBlock').style.display = 'none';
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(blockId).style.display = blockId === 'patternBlock' ? 'flex' : 'block';
            tabEl.classList.add('active');
        }

        // Графический ключ
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, patternNodes = [], drawnPath = [];

        function initPatternNodes() {
            patternNodes = [];
            const step = canvas.width / 4;
            for (let i = 1; i <= 3; i++) {
                for (let j = 1; j <= 3; j++) {
                    patternNodes.push({ id: (i-1)*3 + j, x: j * step, y: i * step });
                }
            }
            drawPattern();
        }

        function drawPattern() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (drawnPath.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff2a5f';
                ctx.lineWidth = 4;
                drawnPath.forEach((node, idx) => {
                    if (idx === 0) ctx.moveTo(node.x, node.y);
                    else ctx.lineTo(node.x, node.y);
                });
                ctx.stroke();
            }
            patternNodes.forEach(node => {
                const isSelected = drawnPath.includes(node);
                ctx.beginPath();
                ctx.arc(node.x, node.y, isSelected ? 12 : 8, 0, Math.PI * 2);
                ctx.fillStyle = isSelected ? '#ff2a5f' : '#222d42';
                ctx.fill();
            });
        }

        renderMovies();
    </script>
</body>
</html>
