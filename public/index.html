<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SevimliKino — Онлайн Фильмы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #141820;
      --bg-card: #1c2230;
      --accent: #e50914;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.1);
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(10, 12, 16, 0.92);
      backdrop-filter: blur(12px);
      padding: 15px 4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .brand-logo span {
      color: var(--accent);
    }

    .search-form {
      position: relative;
      flex-grow: 1;
      max-width: 500px;
    }

    .search-form input {
      width: 100%;
      padding: 12px 16px 12px 45px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    .search-form input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.12);
    }

    .search-form i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .container {
      padding: 100px 4% 60px;
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 20px;
    }

    .movie-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      border: 1px solid transparent;
    }

    .movie-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      border-color: rgba(229, 9, 20, 0.28);
    }

    .card-thumb {
      position: relative;
      width: 100%;
      padding-top: 145%;
      background: var(--bg-secondary);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 12px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(15px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 15px;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-container {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 900px;
      max-height: 95vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
      font-size: 1.2rem;
    }

    .player-box {
      position: relative;
      width: 100%;
      min-height: 450px;
      background: #000;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-box iframe {
      width: 100%;
      height: 100%;
      min-height: 450px;
      border: none;
      display: block;
      background: #000;
    }

    .player-loading {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .modal-details {
      padding: 20px;
    }

    .modal-title-text {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .empty-state {
      grid-column: 1 / -1;
      color: var(--text-muted);
      text-align: center;
      padding: 30px 0;
    }

    /* КНОПКИ ПЕРЕКЛЮЧЕНИЯ СЕРВЕРОВ */
    .server-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .server-tab {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .server-tab.active, .server-tab:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .container {
        padding-top: 140px;
      }
      .movies-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .player-box, .player-box iframe {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="#" class="brand-logo" onclick="return false;">
      <i class="fa-solid fa-play-circle" style="color: var(--accent)"></i>
      Sevimli<span>Kino</span>
    </a>
    <form class="search-form" id="searchForm">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Напишите название фильма (например, Один дома)..." autocomplete="off" />
    </form>
  </header>

  <div class="container">
    <h1 class="section-title" id="sectionTitle">
      <i class="fa-solid fa-fire" style="color: var(--accent)"></i> В тренде
    </h1>
    <div class="movies-grid" id="moviesGrid">
      <p class="empty-state">Загрузка фильмов...</p>
    </div>
  </div>

  <div class="modal" id="videoModal">
    <div class="modal-container">
      <button class="modal-close" id="modalCloseBtn" aria-label="Закрыть">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <div class="player-box" id="playerBox">
        <span class="player-loading">Загрузка видео...</span>
      </div>

      <div class="modal-details">
        <div class="server-tabs" id="serverTabs">
          <button class="server-tab active" data-server="kodik">Сервер 1 (Kodik)</button>
          <button class="server-tab" data-server="voidboost">Сервер 2 (Void)</button>
          <button class="server-tab" data-server="alloha">Сервер 3 (Alloha)</button>
        </div>
        
        <h2 class="modal-title-text" id="modalTitle">Название фильма</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;" id="modalSub">Смотреть онлайн</p>
      </div>
    </div>
  </div>

  <script>
    // Подключаем легальный Кинопоиск для обложек и названий
    const API_KEY = '8c8e1a50-6322-4135-8875-5d40a5420d86';
    const API_URL_POPULAR = 'https://kinopoiskapiunofficial.tech/api/v2.2/films/collections?type=TOP_POPULAR_MOVIES&page=1';
    const API_URL_SEARCH = 'https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=';

    let currentKpId = null;

    const moviesGrid = document.getElementById('moviesGrid');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const sectionTitle = document.getElementById('sectionTitle');
    const videoModal = document.getElementById('videoModal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const playerBox = document.getElementById('playerBox');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const serverBtns = document.querySelectorAll('.server-tab');

    document.addEventListener('DOMContentLoaded', () => {
      loadPopularMovies();

      searchForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (query) searchMovies(query);
        else loadPopularMovies();
      });

      modalCloseBtn.addEventListener('click', closeModal);
      videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });

      // Переключение серверов
      serverBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          serverBtns.forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          loadServer(e.target.dataset.server);
        });
      });
    });

    async function loadPopularMovies() {
      sectionTitle.innerHTML = '<i class="fa-solid fa-fire" style="color: var(--accent)"></i> В тренде';
      moviesGrid.innerHTML = '<p class="empty-state">Загрузка фильмов...</p>';

      try {
        const res = await fetch(API_URL_POPULAR, {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        renderMovies(data.items || []);
      } catch (err) {
        moviesGrid.innerHTML = '<p class="empty-state">Ошибка загрузки каталога</p>';
      }
    }

    async function searchMovies(query) {
      sectionTitle.innerHTML = '<i class="fa-solid fa-magnifying-glass" style="color: var(--accent)"></i> Поиск: "' + escapeHtml(query) + '"';
      moviesGrid.innerHTML = '<p class="empty-state">Ищем...</p>';

      try {
        const res = await fetch(API_URL_SEARCH + encodeURIComponent(query), {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        renderMovies(data.films || []);
      } catch (err) {
        moviesGrid.innerHTML = '<p class="empty-state">Ничего не найдено</p>';
      }
    }

    function renderMovies(movies) {
      moviesGrid.innerHTML = '';

      if (!movies || movies.length === 0) {
        moviesGrid.innerHTML = '<p class="empty-state">Фильмы не найдены</p>';
        return;
      }

      movies.forEach(movie => {
        const id = movie.kinopoiskId || movie.filmId;
        const title = movie.nameRu || movie.nameEn || 'Без названия';
        const year = movie.year || '';
        const poster = movie.posterUrlPreview || movie.posterUrl;

        if (!id) return;

        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `
          <div class="card-thumb">
            <i class="fa-solid fa-film"></i>
            <img src="${poster}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.style.display='none'">
          </div>
          <div class="card-info">
            <div class="card-title">${escapeHtml(title)}</div>
            <div class="card-sub">${escapeHtml(String(year))}</div>
          </div>
        `;

        card.addEventListener('click', () => {
          openPlayer(id, title, year);
        });

        moviesGrid.appendChild(card);
      });
    }

    function openPlayer(kpId, title, year) {
      currentKpId = kpId;
      modalTitle.textContent = title;
      modalSub.textContent = `${year} • Смотреть онлайн`;
      
      videoModal.classList.add('active');
      document.body.style.overflow = 'hidden';

      // Сбрасываем кнопки на Сервер 1
      serverBtns.forEach(b => b.classList.remove('active'));
      serverBtns[0].classList.add('active');
      
      // Запускаем по умолчанию первый сервер
      loadServer('kodik');
    }

    function loadServer(serverName) {
      if (!currentKpId) return;
      
      let iframeUrl = '';
      if (serverName === 'kodik') {
        iframeUrl = `//kodik.cc/find-player?kinopoiskID=${currentKpId}`;
      } else if (serverName === 'voidboost') {
        iframeUrl = `https://voidboost.net/embed/${currentKpId}`;
      } else if (serverName === 'alloha') {
        iframeUrl = `https://api.allohatv.com/?token=4db52824254f69d32d0577f8045620&kp=${currentKpId}`;
      }

      playerBox.innerHTML = `<iframe src="${iframeUrl}" allowfullscreen allow="autoplay" loading="lazy"></iframe>`;
    }

    function closeModal() {
      videoModal.classList.remove('active');
      playerBox.innerHTML = '<span class="player-loading">Загрузка видео...</span>';
      document.body.style.overflow = 'auto';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
