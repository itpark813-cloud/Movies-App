<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SevimliKino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #141820;
      --bg-card: #1c2230;
      --accent: #e50914;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.1);
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-primary); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

    /* Шапка */
    .header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background: rgba(10, 12, 16, 0.92); backdrop-filter: blur(12px); padding: 15px 4%;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-size: 1.5rem; font-weight: 800; cursor: pointer; }
    .brand-logo span { color: var(--accent); }

    .search-form { position: relative; flex-grow: 1; max-width: 500px; }
    .search-form input {
      width: 100%; padding: 12px 16px 12px 45px; background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color); border-radius: 30px; color: #fff; font-size: 0.95rem; outline: none;
    }
    .search-form input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.12); }
    .search-form i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

    .container { padding: 100px 4% 60px; max-width: 1300px; margin: 0 auto; }

    /* Переключение страниц */
    .page { display: none; }
    .page.active { display: block; }

    /* Главная страница */
    .section-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
    
    .hero-card {
      display: flex; background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden;
      border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease;
      max-width: 900px; min-height: 350px;
    }
    .hero-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2); border-color: var(--accent); }
    .hero-thumb { width: 280px; flex-shrink: 0; position: relative; background: var(--bg-secondary); }
    .hero-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-info { padding: 30px; display: flex; flex-direction: column; justify-content: center; gap: 15px; flex-grow: 1; }
    .hero-badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; width: fit-content; }
    .hero-title { font-size: 2rem; font-weight: 800; }
    .hero-meta { color: var(--text-muted); font-size: 0.9rem; display: flex; gap: 15px; }
    .hero-desc { color: var(--text-muted); line-height: 1.6; font-size: 0.95rem; }
    .btn-watch { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; width: fit-content; }

    /* Сетка поиска */
    .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .movie-card { background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: transform 0.3s ease; border: 1px solid transparent; }
    .movie-card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .card-thumb { position: relative; width: 100%; padding-top: 145%; background: var(--bg-secondary); }
    .card-thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .card-info { padding: 12px; }
    .card-title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    /* Отдельная страница просмотра */
    .back-btn { background: var(--bg-secondary); color: #fff; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
    .back-btn:hover { background: rgba(255, 255, 255, 0.1); }

    .watch-container { max-width: 1000px; margin: 0 auto; }
    
    /* Контейнер плеера */
    .player-wrapper {
      position: relative; width: 100%; background: #000; border-radius: var(--radius-lg); overflow: hidden;
      aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color);
    }
    .player-wrapper video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }
    .player-wrapper iframe { width: 100%; height: 100%; border: none; }

    /* Сообщение об отсутствии трейлера */
    .no-trailer-box {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--text-muted); text-align: center; padding: 20px;
    }
    .no-trailer-box i { font-size: 3rem; color: var(--accent); }
    .no-trailer-box p { font-size: 1.2rem; font-weight: 700; color: #fff; }

    .player-controls {
      position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 20px; display: flex; flex-direction: column; gap: 10px; opacity: 0; transition: opacity 0.3s ease;
    }
    .player-wrapper:hover .player-controls { opacity: 1; }

    .progress-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; cursor: pointer; }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .controls-left, .controls-right { display: flex; align-items: center; gap: 15px; }
    .ctrl-btn { background: none; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; transition: color 0.2s; }
    .ctrl-btn:hover { color: var(--accent); }
    .time-display { font-size: 0.85rem; color: var(--text-muted); }

    .speed-btn { background: rgba(255, 255, 255, 0.15); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .speed-btn:hover { background: var(--accent); }

    .watch-details { margin-top: 25px; padding: 25px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
    .watch-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
    .watch-meta { display: flex; gap: 15px; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; align-items: center; }
    .rating-tag { background: #e5a93c; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
    .watch-desc { color: var(--text-main); line-height: 1.6; font-size: 0.95rem; }

    @media (max-width: 768px) {
      .hero-card { flex-direction: column; }
      .hero-thumb { width: 100%; height: 300px; }
      .header { flex-direction: column; }
      .container { padding-top: 130px; }
    }
  </style>
</head>
<body>

  <!-- ХЕДЕР -->
  <header class="header">
    <div class="brand-logo" id="logoBtn">
      <i class="fa-solid fa-play-circle" style="color: var(--accent)"></i> Sevimli<span>Kino</span>
    </div>
    <form class="search-form" id="searchForm">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Поиск фильма в каталоге..." autocomplete="off" />
    </form>
  </header>

  <div class="container">
    
    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="homePage" class="page active">
      <div id="featuredSection">
        <h1 class="section-title"><i class="fa-solid fa-star" style="color: var(--accent)"></i> Доступно для просмотра</h1>
        
        <div class="hero-card" id="mainMovieCard">
          <div class="hero-thumb">
            <img id="spidermanImg" src="" alt="Новый Человек-паук" />
          </div>
          <div class="hero-info">
            <span class="hero-badge">Полный фильм</span>
            <h2 class="hero-title" id="spidermanTitle">Загрузка...</h2>
            <div class="hero-meta">
              <span id="spidermanYear">—</span>
              <span><i class="fa-solid fa-star" style="color: #e5a93c"></i> <span id="spidermanRating">—</span></span>
            </div>
            <p class="hero-desc" id="spidermanDesc">Загрузка описания из Кинопоиска...</p>
            <button class="btn-watch"><i class="fa-solid fa-play"></i> Смотреть сейчас</button>
          </div>
        </div>
      </div>

      <!-- СЕКЦИЯ ПОИСКА -->
      <div id="searchSection" style="display: none;">
        <h1 class="section-title" id="searchTitle"><i class="fa-solid fa-magnifying-glass" style="color: var(--accent)"></i> Результаты поиска</h1>
        <div class="movies-grid" id="searchGrid"></div>
      </div>
    </div>

    <!-- СТРАНИЦА ПРОСМОТРА -->
    <div id="watchPage" class="page">
      <button class="back-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Назад к каталогу</button>

      <div class="watch-container">
        <div class="player-wrapper" id="playerContainer">
          
          <!-- Твоё видео (.mp4) -->
          <video id="videoElement" src="" style="display: none;"></video>
          
          <!-- Органы управления плеером -->
          <div class="player-controls" id="customControls" style="display: none;">
            <div class="progress-bar-container" id="progressContainer">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="controls-row">
              <div class="controls-left">
                <button class="ctrl-btn" id="playPauseBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
                <button class="ctrl-btn" id="muteBtn"><i class="fa-solid fa-volume-high" id="volumeIcon"></i></button>
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
              </div>
              <div class="controls-right">
                <button class="speed-btn" id="speedBtn">1x</button>
                <button class="ctrl-btn" id="fullscreenBtn"><i class="fa-solid fa-expand"></i></button>
              </div>
            </div>
          </div>

          <!-- Трейлер YouTube -->
          <iframe id="trailerIframe" src="" style="display: none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>

          <!-- Сообщение, если трейлер не найден -->
          <div class="no-trailer-box" id="noTrailerBox">
            <i class="fa-solid fa-video-slash"></i>
            <p>Трейлер не найден</p>
            <span style="font-size: 0.85rem;">Для этого фильма нет доступного видеоролика</span>
          </div>
        </div>

        <!-- Информация о фильме -->
        <div class="watch-details">
          <h1 class="watch-title" id="watchTitle">Загрузка...</h1>
          <div class="watch-meta">
            <span id="watchYear">—</span>
            <span class="rating-tag" id="watchRating">—</span>
            <span id="watchType" style="color: var(--accent); font-weight: 700;">Полный фильм</span>
          </div>
          <p class="watch-desc" id="watchDesc">Описание...</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API_KEY = '8c8e1a50-6322-4135-8875-5d40a5420d86';
    const API_FILM_URL = 'https://kinopoiskapiunofficial.tech/api/v2.2/films/';
    const API_SEARCH_URL = 'https://kinopoiskapiunofficial.tech/api/v2.1/films/search-by-keyword?keyword=';

    // Элементы страницы
    const homePage = document.getElementById('homePage');
    const watchPage = document.getElementById('watchPage');
    const featuredSection = document.getElementById('featuredSection');
    const searchSection = document.getElementById('searchSection');
    const searchGrid = document.getElementById('searchGrid');
    const searchTitle = document.getElementById('searchTitle');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const logoBtn = document.getElementById('logoBtn');
    const backBtn = document.getElementById('backBtn');

    // Элементы Человека-паука на главной
    const spidermanImg = document.getElementById('spidermanImg');
    const spidermanTitle = document.getElementById('spidermanTitle');
    const spidermanYear = document.getElementById('spidermanYear');
    const spidermanRating = document.getElementById('spidermanRating');
    const spidermanDesc = document.getElementById('spidermanDesc');

    // Плеер
    const playerContainer = document.getElementById('playerContainer');
    const videoElem = document.getElementById('videoElement');
    const customControls = document.getElementById('customControls');
    const trailerIframe = document.getElementById('trailerIframe');
    const noTrailerBox = document.getElementById('noTrailerBox');

    // Кнопки управления
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const timeDisplay = document.getElementById('timeDisplay');
    const muteBtn = document.getElementById('muteBtn');
    const volumeIcon = document.getElementById('volumeIcon');
    const speedBtn = document.getElementById('speedBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // Детали фильма
    const watchTitle = document.getElementById('watchTitle');
    const watchYear = document.getElementById('watchYear');
    const watchRating = document.getElementById('watchRating');
    const watchType = document.getElementById('watchType');
    const watchDesc = document.getElementById('watchDesc');

    // Главный фильм (Человек-паук)
    let spidermanData = {
      title: "Новый Человек-паук",
      year: "2012",
      rating: "6.9",
      desc: "",
      // Твоя прямая ссылка на видеофайл .mp4
      videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
    };

    const speeds = [0.5, 1.0, 1.25, 1.5, 2.0];
    let currentSpeedIndex = 1;

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Загружаем данные Человека-паука из API (ID 6039)
      loadSpidermanFromApi();

      // 2. Клик по карточке Человека-паука
      document.getElementById('mainMovieCard').addEventListener('click', () => {
        openWatchPage({
          title: spidermanData.title,
          year: spidermanData.year,
          rating: spidermanData.rating,
          desc: spidermanData.desc,
          videoUrl: spidermanData.videoUrl,
          isFullMovie: true
        });
      });

      // Поиск
      searchForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (query) fetchSearch(query);
      });

      logoBtn.addEventListener('click', showHomePage);
      backBtn.addEventListener('click', showHomePage);

      // Плеер
      playPauseBtn.addEventListener('click', togglePlay);
      videoElem.addEventListener('click', togglePlay);
      videoElem.addEventListener('timeupdate', updateProgress);
      progressContainer.addEventListener('click', setProgress);
      muteBtn.addEventListener('click', toggleMute);
      speedBtn.addEventListener('click', cycleSpeed);
      fullscreenBtn.addEventListener('click', toggleFullscreen);
    });

    // Получение данных Человека-паука из API
    async function loadSpidermanFromApi() {
      try {
        const res = await fetch(API_FILM_URL + '6039', {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        
        spidermanData.title = data.nameRu || data.nameOriginal || "Новый Человек-паук";
        spidermanData.year = data.year || "2012";
        spidermanData.rating = data.ratingKinopoisk || data.rating || "6.9";
        spidermanData.desc = data.description || "В детстве Питер Паркер был оставлен своими родителями...";

        spidermanImg.src = data.posterUrl || data.posterUrlPreview;
        spidermanTitle.textContent = spidermanData.title;
        spidermanYear.textContent = spidermanData.year;
        spidermanRating.textContent = spidermanData.rating;
        spidermanDesc.textContent = spidermanData.desc;
      } catch (err) {
        console.error("Ошибка загрузки данных Человека-паука:", err);
        spidermanTitle.textContent = "Новый Человек-паук";
        spidermanDesc.textContent = "Не удалось загрузить описание из сети.";
      }
    }

    function showHomePage() {
      watchPage.classList.remove('active');
      homePage.classList.add('active');
      stopVideo();
    }

    // Открытие страницы просмотра
    async function openWatchPage(movie) {
      homePage.classList.remove('active');
      watchPage.classList.add('active');
      window.scrollTo(0, 0);

      watchTitle.textContent = movie.title;
      watchYear.textContent = movie.year || '—';
      watchRating.textContent = movie.rating || 'N/A';
      watchDesc.textContent = movie.desc || 'Описание отсутствует.';

      stopVideo();

      if (movie.isFullMovie) {
        // Запуск твоего .mp4 видео
        watchType.textContent = "Полный фильм";
        watchType.style.color = "var(--accent)";
        
        trailerIframe.style.display = 'none';
        noTrailerBox.style.display = 'none';
        videoElem.style.display = 'block';
        customControls.style.display = 'flex';

        videoElem.src = movie.videoUrl;
        videoElem.play();
        playIcon.className = 'fa-solid fa-pause';
      } else {
        // Загрузка трейлера из Кинопоиска
        watchType.textContent = "Трейлер";
        watchType.style.color = "#e5a93c";

        videoElem.style.display = 'none';
        customControls.style.display = 'none';
        
        // Получаем детальную информацию и трейлер через API
        fetchTrailerForFilm(movie.filmId, movie.title);
      }
    }

    // Загрузка реального трейлера через API Кинопоиска
    async function fetchTrailerForFilm(filmId, fallbackTitle) {
      trailerIframe.style.display = 'none';
      noTrailerBox.style.display = 'none';

      try {
        // 1. Подгружаем полное описание фильма, если его не было
        const detailRes = await fetch(API_FILM_URL + filmId, {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const detailData = await detailRes.json();
        if (detailData.description) watchDesc.textContent = detailData.description;

        // 2. Запрашиваем списки видео к фильму
        const videoRes = await fetch(`${API_FILM_URL}${filmId}/videos`, {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const videoData = await videoRes.json();

        let youtubeUrl = null;
        if (videoData.items && videoData.items.length > 0) {
          // Ищем ролик с YouTube
          const ytItem = videoData.items.find(v => v.site === 'YOUTUBE' || (v.url && v.url.includes('youtube')));
          if (ytItem) youtubeUrl = ytItem.url;
        }

        if (youtubeUrl) {
          const ytId = extractYouTubeId(youtubeUrl);
          if (ytId) {
            trailerIframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            trailerIframe.style.display = 'block';
            return;
          }
        }

        // Если ролик не найден в базе
        showNoTrailer();

      } catch (err) {
        console.error("Ошибка загрузки трейлера:", err);
        showNoTrailer();
      }
    }

    function showNoTrailer() {
      trailerIframe.style.display = 'none';
      noTrailerBox.style.display = 'flex';
    }

    // Извлечение ID видео из ссылок YouTube
    function extractYouTubeId(url) {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function stopVideo() {
      videoElem.pause();
      videoElem.src = '';
      trailerIframe.src = '';
      noTrailerBox.style.display = 'none';
    }

    // Поиск фильмов
    async function fetchSearch(query) {
      featuredSection.style.display = 'none';
      searchSection.style.display = 'block';
      searchTitle.innerHTML = `<i class="fa-solid fa-magnifying-glass" style="color: var(--accent)"></i> Результаты поиска: "${query}"`;
      searchGrid.innerHTML = '<p style="color: var(--text-muted)">Загрузка...</p>';

      try {
        const res = await fetch(API_SEARCH_URL + encodeURIComponent(query), {
          headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        renderSearchResults(data.films || []);
      } catch (err) {
        searchGrid.innerHTML = '<p style="color: var(--text-muted)">Ошибка загрузки поиска</p>';
      }
    }

    function renderSearchResults(movies) {
      searchGrid.innerHTML = '';
      if (!movies.length) {
        searchGrid.innerHTML = '<p style="color: var(--text-muted)">Ничего не найдено</p>';
        return;
      }

      movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `
          <div class="card-thumb">
            <img src="${movie.posterUrlPreview || movie.posterUrl}" alt="${movie.nameRu || movie.nameEn}" />
          </div>
          <div class="card-info">
            <div class="card-title">${movie.nameRu || movie.nameEn}</div>
            <div class="card-sub">${movie.year || ''} • Рейтинг: ${movie.rating || 'N/A'}</div>
          </div>
        `;

        card.addEventListener('click', () => {
          openWatchPage({
            filmId: movie.filmId,
            title: movie.nameRu || movie.nameEn,
            year: movie.year,
            rating: movie.rating,
            desc: movie.description || "Загрузка полного описания...",
            isFullMovie: false
          });
        });

        searchGrid.appendChild(card);
      });
    }

    // Функции плеера
    function togglePlay() {
      if (videoElem.paused) {
        videoElem.play();
        playIcon.className = 'fa-solid fa-pause';
      } else {
        videoElem.pause();
        playIcon.className = 'fa-solid fa-play';
      }
    }

    function updateProgress() {
      if (!videoElem.duration) return;
      const percent = (videoElem.currentTime / videoElem.duration) * 100;
      progressBar.style.width = percent + '%';

      const curM = Math.floor(videoElem.currentTime / 60);
      const curS = Math.floor(videoElem.currentTime % 60);
      const durM = Math.floor(videoElem.duration / 60) || 0;
      const durS = Math.floor(videoElem.duration % 60) || 0;

      timeDisplay.textContent = `${curM}:${curS < 10 ? '0' : ''}${curS} / ${durM}:${durS < 10 ? '0' : ''}${durS}`;
    }

    function setProgress(e) {
      const width = this.clientWidth;
      const clickX = e.offsetX;
      videoElem.currentTime = (clickX / width) * videoElem.duration;
    }

    function toggleMute() {
      videoElem.muted = !videoElem.muted;
      volumeIcon.className = videoElem.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
    }

    function cycleSpeed() {
      currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
      const newSpeed = speeds[currentSpeedIndex];
      videoElem.playbackRate = newSpeed;
      speedBtn.textContent = `${newSpeed}x`;
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        playerContainer.requestFullscreen().catch(err => alert(err.message));
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
