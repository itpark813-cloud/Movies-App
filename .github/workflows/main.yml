name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # или master (зависит от названия вашей главной ветки в GitHub)

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEVIMLIKINO }}"
          channelId: live
          projectId: sevimlikino
